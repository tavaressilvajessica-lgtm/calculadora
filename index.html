<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculadora</title>
<style>
body {
   font-family: Arial;
  text-align: center;
  margin-top: 50px;
}
  button {
    width: 50px;
    height: 50px;
    margin: 5px;
    font-size: 18px;
  }
  input {
    width: 220px;
    height: 40px;
    font-size: 18px;
    text-align: right;>
  }
  </style>
</head>
  <body>

    <h2>calculadora</h2>

    <input type="text" id="mostrar" disabled>
    <br>

    <button onclick="adicionar('7')">7</button>
    <button onclick="adicionar('8')">8</button>
    <button onclick="adicionar('9')">9</button>
    <button onclick="adicionar('/')">/</button>
    <br>

    <button onclick="adicionar('4')">4</button>
    <button onclick="adicionar('5')">5</button>
    <button onclick="adicionar('6')">6</button>
    <button onclick="adicionar('*')">*</button>
    <br>

    <button onclick="adicionar('1')">1</button>
    <button onclick="adicionar('2')">2</button>
    <button onclick="adicionar('3')">3</button>
    <button onclick="adicionar('-')">-</button>
    <br>

    <button onclick="adicionar('0')">0</button>
    <button onclick="limpar()">C</button>
    <button onclick="calcular()">=</button>
    <button onclick="adicionar('+')">+</button>

    <script>
       function adicionar(num) {
          document.getElementbyId("mostrar").value += num;
           }
       function calcular() {
       var resultado = document.getElementById("mostrar").value;
          if(resultado) {
             document.getElementById("mostrar").value = eval(resultado);
          }
       }
       function limpar() {
          document.getElementById("mostrar").value = "";
       }
    </script>
